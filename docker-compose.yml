version: '3.8'

services:
  nexus-mantto:
    container_name: nexus-mantto-app
    build: https://github.com/alejandroeml-su/nexus-mantto.git#main
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mantto
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mantto
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mantto"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
